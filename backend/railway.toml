[build]
builder = "NIXPACKS"
buildCommand = "npm install && echo 'CHROMIUM PATH:' && which chromium || which chromium-browser || echo 'not found'"

[build.env]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
