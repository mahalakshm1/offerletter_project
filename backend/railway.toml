[build]
builder = "NIXPACKS"
buildCommand = "npm install && find /nix -name 'chromium' -type f 2>/dev/null | head -5 && find /usr -name 'chromium*' -type f 2>/dev/null | head -5"

[build.env]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
